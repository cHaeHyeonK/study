<!DOCTYPE html>

<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width = device-width, initial-scale = 1.0">
    <title>네이버 UI</title>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="naver.css">
</head>

<body>
    <div class="container">
        <div class="screen">
            <header>
                <div class="menu_bar">
                    <div class="left_menu">
                        <span class="material-symbols-outlined">menu</span>
                        <span class="material-symbols-outlined">wallet</span>
                    </div>
                    <div class="right_menu">
                        <span class="material-symbols-outlined">notifications</span>
                        <span class="material-symbols-outlined">shopping_bag</span>
                    </div>
                </div>

                <div class="search">
                    <div class="logo"></div>
                    <div class="search_box">
                        <span class="material-symbols-outlined" id = "search_icon">search</span>
                    </div>
                </div>
                <nav>
                    <div class="nav_bar">
                        <span class="material-symbols-outlined">mail</span>
                        <span class="material-symbols-outlined">local_cafe</span>
                        <span class="material-symbols-outlined">post</span>
                        <span class="material-symbols-outlined">storefront</span>
                        <span class="material-symbols-outlined">news</span>
                        <span class="material-symbols-outlined">candlestick_chart</span>
                        <span class="material-symbols-outlined">real_estate_agent</span>
                        <span class="material-symbols-outlined">map</span>
                        <span class="material-symbols-outlined">manga</span>
                        <span class="material-symbols-outlined">live_tv</span>
                    </div>
                </nav>
            </header>
            <main></main>
            <aside></aside>
        </div>
    </div>
</body>

</html>
